<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ Print Layout Pro - AJartivo</title>
    <script>
        (function () {
            var search = String(window.location.search || "");
            var hash = String(window.location.hash || "");
            var params = new URLSearchParams(search);
            var tool = params.get("tool") || params.get("id");
            var target = tool
                ? "/tools/aj-print-layout-pro/studio.html?tool=" + encodeURIComponent(tool) + hash
                : "/tools/aj-print-layout-pro/" + search + hash;
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>Redirecting to AJ Print Layout Pro...</p>
</body>
</html>
