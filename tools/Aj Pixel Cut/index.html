<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AJ Pixel Cut</title>
<link rel="icon" href="icon/favicon.ico">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">AJ Pixel Cut</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Tools</a>
        <a href="#">Pricing</a>
    </nav>
</header>

<!-- MAIN -->
<div class="main">

    <h1>Premium AI Background Remover</h1>
    <p>Upload your image and remove background instantly</p>

    <!-- DRAG & DROP -->
    <div class="drop-zone" id="dropZone">
        <p>Drag & Drop Image Here</p>
        <span>or</span>
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload Image</button>
    </div>

    <!-- LOADER -->
    <div id="loader" class="loader hidden">Processing...</div>

    <!-- RESULT -->
    <img id="result">

    <button id="downloadBtn" class="hidden">Download</button>

</div>

<script>
let selectedFile;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("active");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("active");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("active");

    selectedFile = e.dataTransfer.files[0];
});

fileInput.addEventListener("change", () => {
    selectedFile = fileInput.files[0];
});

function upload() {

    if (!selectedFile) {
        alert("Select or drag image");
        return;
    }

    document.getElementById("loader").classList.remove("hidden");

    const formData = new FormData();
    formData.append("image", selectedFile);

    fetch("/remove-bg", {
        method: "POST",
        body: formData
    })
    .then(res => res.blob())
    .then(blob => {

        const url = URL.createObjectURL(blob);
        document.getElementById("result").src = url;

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.classList.remove("hidden");

        downloadBtn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "output.png";
            a.click();
        };

        document.getElementById("loader").classList.add("hidden");
    });
}
</script>

</body>
</html>
