<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>
    <main class="profile-page-shell">
        <section class="profile-card-layout">
            <aside class="profile-summary-card">
                <div class="profile-avatar-ring">
                    <img id="profileAvatar" src="/images/default-user.png" alt="User Avatar">
                </div>
                <h1 id="profileName">User Name</h1>
                <p id="profileEmail">user@email.com</p>
                <span class="profile-pill">Creative Member</span>
            </aside>

            <section class="profile-details-card">
                <div class="profile-topbar">
                    <div>
                        <p class="profile-kicker">Account overview</p>
                        <h2>Your Profile</h2>
                    </div>
                    <button id="logout" class="profile-logout-btn">Logout</button>
                </div>

                <div id="userData" class="profile-info-grid">
                    <article class="profile-info-box">
                        <span>Name</span>
                        <strong>User Name</strong>
                    </article>
                    <article class="profile-info-box">
                        <span>Email</span>
                        <strong>user@email.com</strong>
                    </article>
                </div>
            </section>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile-page.js"></script>
</body>

</html>
