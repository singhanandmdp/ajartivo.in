<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - AJartivo</title>
    <link rel="stylesheet" href="../css/search.css">
</head>

<body>
    <div id="site-header"></div>

    <section class="search-page">
        <h2 id="searchTitle">Search Results</h2>

        <div class="filter-bar">
            <div class="filter-group">
                <select class="filter-select" id="fileTypeFilter">
                    <option value="">All File Types</option>
                    <option value="PSD">PSD</option>
                    <option value="CDR">CDR</option>
                    <option value="AI">AI</option>
                    <option value="PMD">PMD</option>
                    <option value="PNG">PNG</option>
                    <option value="JPG">JPG</option>
                    <option value="JPEG">JPEG</option>
                    <option value="PDF">PDF</option>
                    <option value="SVG">SVG</option>
                    <option value="EPS">EPS</option>
                </select>

                <select class="filter-select" id="licenseFilter">
                    <option value="">All License Types</option>
                    <option value="free">Free</option>
                    <option value="premium">Premium</option>
                </select>

                <select class="filter-select" id="aiFilter">
                    <option value="">AI Generated</option>
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                </select>

                <select class="filter-select" id="orientationFilter">
                    <option value="">Orientation</option>
                    <option value="horizontal">Horizontal</option>
                    <option value="vertical">Vertical</option>
                    <option value="landscape">Landscape</option>
                    <option value="portrait">Portrait</option>
                    <option value="square">Square</option>
                    <option value="panoramic">Panoramic</option>
                </select>

                <select class="filter-select" id="colorFilter">
                    <option value="">Color</option>
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="black">Black</option>
                    <option value="yellow">Yellow</option>
                    <option value="orange">Orange</option>
                    <option value="purple">Purple</option>
                    <option value="white">White</option>
                </select>
            </div>

            <div class="sort-group">
                <label>Sort By</label>

                <select class="filter-select" id="sortFilter">
                    <option value="latest" selected>Latest</option>
                    <option value="oldest">Oldest</option>
                    <option value="trending">Trending</option>
                    <option value="downloads">Most Downloaded</option>
                    <option value="views">Most Viewed</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                    <option value="az">Title: A to Z</option>
                    <option value="za">Title: Z to A</option>
                </select>
                <button type="button" class="clear-filter-btn" id="clearFiltersBtn">Clear</button>
            </div>
        </div>

        <div class="active-filter-row" id="activeFilterRow"></div>
        <p id="searchResultMeta" class="search-meta"></p>
        <div id="results" class="trending-grid"></div>

        <div class="pagination" id="searchPagination"></div>
        <div class="pagination" id="searchPaginationBottom"></div>
    </section>

    <aside class="sidebar" id="sidebarMenu"></aside>
    <div class="menu-overlay" id="menuOverlay"></div>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js?v=20260410-1"></script>
    <script src="../js/auth.js?v=20260410-1"></script>
    <script src="../js/script.js?v=20260403-1"></script>
</body>

</html>
