<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJartivo | Payment Successful</title>
    <style>
        :root {
            --bg: #f3f8f2;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #166534;
            --accent-dark: #14532d;
            --line: #d9ead7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(22, 101, 52, 0.12), transparent 28%),
                linear-gradient(180deg, #fbfefb 0%, var(--bg) 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 720px);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(31, 41, 55, 0.08);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(32px, 5vw, 46px);
            line-height: 1.05;
        }

        .description {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.7;
        }

        .info-box {
            display: grid;
            gap: 12px;
            padding: 22px;
            background: #f8fdf8;
            border: 1px solid var(--line);
            border-radius: 20px;
            margin-bottom: 18px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .label {
            color: var(--muted);
        }

        .value {
            font-weight: 700;
            word-break: break-word;
        }

        .button {
            appearance: none;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 18px 30px rgba(22, 101, 52, 0.20);
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .subtle {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">AJartivo Confirmation</p>
        <h1>Payment Successful</h1>
        <p class="description">Your payment has been received. Click the button below to download your file safely.</p>

        <section class="info-box">
            <div class="row">
                <span class="label">Design</span>
                <span class="value" id="designName">-</span>
            </div>
            <div class="row">
                <span class="label">Amount</span>
                <span class="value" id="designAmount">-</span>
            </div>
            <div class="row">
                <span class="label">Payment ID</span>
                <span class="value" id="paymentId">-</span>
            </div>
            <div class="row">
                <span class="label">File</span>
                <span class="value" id="fileName">-</span>
            </div>
        </section>

        <button class="button" id="downloadBtn" type="button">Download Now</button>
        <p class="subtle">If the download does not begin instantly, your browser may ask for confirmation.</p>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get("file") || "";
        const designName = params.get("name") || "AJartivo Design";
        const amount = params.get("amount") || "0";
        const paymentId = params.get("payment_id") || "N/A";

        document.getElementById("designName").textContent = designName;
        document.getElementById("designAmount").textContent = "INR " + amount;
        document.getElementById("paymentId").textContent = paymentId;
        document.getElementById("fileName").textContent = file || "No file selected";

        const downloadBtn = document.getElementById("downloadBtn");

        if (!file) {
            downloadBtn.disabled = true;
            downloadBtn.textContent = "Download Unavailable";
        }

        downloadBtn.addEventListener("click", function () {
            if (!file) {
                alert("Download file is missing.");
                return;
            }

            const link = document.createElement("a");
            link.href = file;
            link.download = file.split("/").pop() || "download";
            link.rel = "noopener";
            document.body.appendChild(link);
            link.click();
            link.remove();
        });
    </script>
</body>
</html>
