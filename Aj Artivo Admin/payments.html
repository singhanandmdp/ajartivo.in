<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="Favicon.ico" type="image/x-icon">
  <title>AjArtivo Payments</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="payments">
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>AjArtivo</strong>
        <span>Design Upload Admin</span>
      </div>
      <nav>
        <ul class="menu">
          <li><a data-nav="dashboard" href="dashboard.html">Dashboard</a></li>
          <li><a data-nav="upload" href="upload.html">Upload Designs</a></li>
          <li><a data-nav="users" href="users.html">Users Access</a></li>
          <li><a data-nav="payments" href="payments.html">Payments</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="btn btn-outline" data-action="logout">Logout</button>
      </div>
    </aside>

    <main class="main">
      <header class="panel hero">
        <div>
          <h1>Payments Control</h1>
          <p>Track design sales and payment records from the AjArtivo panel.</p>
        </div>
        <div><span class="badge" id="revenueBadge">Revenue: INR 0</span></div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Add Payment Entry</h2>
        </div>
        <form id="paymentForm" class="form-grid">
          <div class="field">
            <label for="designId">Design</label>
            <select id="designId" name="designId" required>
              <option value="">Select design</option>
            </select>
          </div>
          <div class="field">
            <label for="payer">Payer</label>
            <input id="payer" name="payer" type="text" required>
          </div>
          <div class="field">
            <label for="quantity">Downloads / Qty</label>
            <input id="quantity" name="quantity" type="number" min="1" value="1" required>
          </div>
          <div class="field">
            <label for="amount">Amount (INR)</label>
            <input id="amount" name="amount" type="number" min="0" required readonly>
          </div>
          <div class="field">
            <label for="method">Method</label>
            <select id="method" name="method">
              <option value="UPI">UPI</option>
              <option value="Card">Card</option>
              <option value="Bank">Bank</option>
            </select>
          </div>
          <div class="field">
            <label for="paymentStatus">Status</label>
            <select id="paymentStatus" name="paymentStatus">
              <option value="Paid">Paid</option>
              <option value="Pending">Pending</option>
              <option value="Failed">Failed</option>
            </select>
          </div>
          <div class="field full row">
            <button type="submit" class="btn btn-primary">Add Payment</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Payments History</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Design</th>
                <th>Payer</th>
                <th>Qty</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="paymentsTable"></tbody>
          </table>
        </div>
      </section>
      <footer class="footer">AjArtivo Admin Panel <span data-year></span></footer>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="utils/auth-check.js"></script>
  <script type="module" src="js/supabase-data.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/payments.js"></script>
</body>
</html>
