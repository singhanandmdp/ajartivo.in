<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AjArtivo User Access</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="users">
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>AjArtivo</strong>
        <span>Design Upload Admin</span>
      </div>
      <nav>
        <ul class="menu">
          <li><a data-nav="dashboard" href="dashboard.html">Dashboard</a></li>
          <li><a data-nav="upload" href="upload.html">Upload Designs</a></li>
          <li><a data-nav="users" href="users.html">Users Access</a></li>
          <li><a data-nav="payments" href="payments.html">Payments</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="btn btn-outline" data-action="logout">Logout</button>
      </div>
    </aside>

    <main class="main">
      <header class="panel hero">
        <div>
          <h1>Admin User Access</h1>
          <p>Manage who can access the website control panel from here.</p>
        </div>
        <div><span class="badge">Access Manager</span></div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Add New Admin User</h2>
        </div>
        <form id="userForm" class="form-grid">
          <div class="field">
            <label for="userName">Name</label>
            <input id="userName" name="userName" type="text" required>
          </div>
          <div class="field">
            <label for="userEmail">Email</label>
            <input id="userEmail" name="userEmail" type="email" required>
          </div>
          <div class="field">
            <label for="userRole">Role</label>
            <select id="userRole" name="userRole">
              <option value="Content Manager">Content Manager</option>
              <option value="Uploader">Uploader</option>
              <option value="Super Admin">Super Admin</option>
            </select>
          </div>
          <div class="field">
            <label for="userStatus">Status</label>
            <select id="userStatus" name="userStatus">
              <option value="Active">Active</option>
              <option value="Pending">Pending</option>
              <option value="Blocked">Blocked</option>
            </select>
          </div>
          <div class="field full row">
            <button type="submit" class="btn btn-primary">Add User</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Current Admin Users</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </section>
      <footer class="footer">AjArtivo Admin Panel <span data-year></span></footer>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="utils/auth-check.js"></script>
  <script type="module" src="js/supabase-data.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
