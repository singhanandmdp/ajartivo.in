<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AjArtivo Upload Panel</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="upload">
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>AjArtivo</strong>
        <span>Design Upload Admin</span>
      </div>
      <nav>
        <ul class="menu">
          <li><a data-nav="dashboard" href="dashboard.html">Dashboard</a></li>
          <li><a data-nav="upload" href="upload.html">Upload Designs</a></li>
          <li><a data-nav="users" href="users.html">Users Access</a></li>
          <li><a data-nav="payments" href="payments.html">Payments</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="btn btn-outline" data-action="logout">Logout</button>
      </div>
    </aside>

    <main class="main">
      <header class="panel hero">
        <div>
          <h1>Design Upload Panel</h1>
          <p>Publish new design assets for the AjArtivo website from this section.</p>
        </div>
        <div><span class="badge" id="uploadStatus">Ready to upload</span></div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Upload New Design</h2>
        </div>
        <form id="designForm" class="form-grid">
          <div class="field">
            <label for="name">Design Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="JPG">JPG</option>
              <option value="PNG">PNG</option>
              <option value="SVG">SVG</option>
              <option value="PSD">PSD</option>
              <option value="CDR">CDR</option>
              <option value="AI">AI</option>
              <option value="EPS">EPS</option>
              <option value="PDF">PDF</option>
              <option value="ZIP">ZIP</option>
            </select>
          </div>
          <div class="field">
            <label>Payment Mode</label>
            <div class="row payment-mode">
              <label><input type="radio" name="paymentMode" value="paid" checked> Paid</label>
              <label><input type="radio" name="paymentMode" value="free"> Free</label>
            </div>
          </div>
          <div class="field" id="priceField">
            <label for="price">Price (INR)</label>
            <input id="price" name="price" type="number" min="0" required>
          </div>
          <div class="field">
            <label for="downloadUrl">Download Link</label>
            <input id="downloadUrl" name="downloadUrl" type="url" placeholder="https://">
          </div>
          <div class="field full">
            <label for="previewUrl">Preview Image URL</label>
            <input id="previewUrl" name="previewUrl" type="url" placeholder="https://image-link">
          </div>
          <div class="field full">
            <label for="previewFile">Or Upload Preview Image File</label>
            <input id="previewFile" name="previewFile" type="file" accept="image/*">
          </div>
          <div class="field full">
            <label>More Images (URL or File)</label>
            <div id="additionalImageInputs" class="image-input-list"></div>
            <button type="button" id="addImageBtn" class="btn btn-soft add-image-btn">+ Add Image</button>
          </div>
          <div class="field full">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
          </div>
          <div class="field full row">
            <button type="submit" class="btn btn-primary">Save Design</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Latest Uploaded Designs</h2>
        </div>
        <div class="cards" id="designCards"></div>
      </section>
      <footer class="footer">AjArtivo Admin Panel <span data-year></span></footer>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="utils/auth-check.js"></script>
  <script type="module" src="js/supabase-data.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/upload.js?v=20260325-1"></script>
</body>
</html>
