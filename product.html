<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJartivo | Product</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --bg: #f5efe6;
            --card: #fffaf4;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #c2410c;
            --accent-dark: #9a3412;
            --line: #ead8c5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(194, 65, 12, 0.10), transparent 28%),
                linear-gradient(180deg, #fffaf4 0%, #f5efe6 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 720px);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(31, 41, 55, 0.10);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.05;
        }

        .description {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.7;
        }

        .product-box {
            display: grid;
            gap: 18px;
            padding: 22px;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 20px;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pill {
            padding: 10px 14px;
            border-radius: 999px;
            background: #fdf1e5;
            border: 1px solid #f3cfaf;
            font-size: 14px;
        }

        .price {
            font-size: 36px;
            font-weight: 700;
        }

        .button {
            appearance: none;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 18px 30px rgba(194, 65, 12, 0.22);
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .note {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .error {
            margin-top: 18px;
            color: #b91c1c;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">AJartivo Premium Download</p>
        <h1 id="productTitle">Loading product...</h1>
        <p class="description" id="productDescription">Please wait while we prepare the product details.</p>

        <section class="product-box">
            <div class="meta">
                <span class="pill" id="productCode">Product</span>
                <span class="pill" id="productFile">File</span>
            </div>

            <div class="price" id="productPrice">&#8377;0</div>

            <button class="button" id="buyNowBtn" type="button">Buy Now</button>
            <p class="note">After successful payment, you will be redirected to a confirmation page with a secure download button.</p>
            <div class="error" id="statusMessage"></div>
        </section>
    </main>

    <script>
        const RAZORPAY_KEY = "rzp_live_SUjeQN7Wu5zSJz";

        const PRODUCTS = {
            product1: {
                id: "product1",
                name: "Product 1",
                description: "Premium downloadable design package for AJartivo.",
                amount: 20,
                file: "downloads/file1.zip"
            },
            product2: {
                id: "product2",
                name: "Product 2",
                description: "Advanced premium downloadable design package for AJartivo.",
                amount: 50,
                file: "downloads/file2.zip"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const productId = params.get("id") || "product1";
        const product = PRODUCTS[productId];

        const titleEl = document.getElementById("productTitle");
        const descriptionEl = document.getElementById("productDescription");
        const codeEl = document.getElementById("productCode");
        const fileEl = document.getElementById("productFile");
        const priceEl = document.getElementById("productPrice");
        const buttonEl = document.getElementById("buyNowBtn");
        const statusEl = document.getElementById("statusMessage");

        if (!product) {
            titleEl.textContent = "Product not found";
            descriptionEl.textContent = "The selected product is not available.";
            codeEl.textContent = "Invalid";
            fileEl.textContent = "Unavailable";
            priceEl.innerHTML = "&#8377;0";
            buttonEl.disabled = true;
            statusEl.textContent = "Please check the product link and try again.";
        } else {
            titleEl.textContent = product.name;
            descriptionEl.textContent = product.description;
            codeEl.textContent = product.id;
            fileEl.textContent = product.file;
            priceEl.innerHTML = "&#8377;" + product.amount;
        }

        buttonEl.addEventListener("click", function () {
            if (!product) return;
            if (typeof Razorpay === "undefined") {
                alert("Razorpay checkout failed to load.");
                return;
            }

            buttonEl.disabled = true;
            statusEl.textContent = "";

            const options = {
                key: RAZORPAY_KEY,
                amount: product.amount * 100,
                currency: "INR",
                name: "AJartivo",
                description: product.name,
                handler: function (response) {
                    const nextUrl = new URL("success.html", window.location.href);
                    nextUrl.searchParams.set("id", product.id);
                    nextUrl.searchParams.set("name", product.name);
                    nextUrl.searchParams.set("amount", String(product.amount));
                    nextUrl.searchParams.set("file", product.file);
                    nextUrl.searchParams.set("payment_id", response.razorpay_payment_id || "");

                    setTimeout(function () {
                        window.location.href = nextUrl.toString();
                    }, 900);
                },
                modal: {
                    ondismiss: function () {
                        buttonEl.disabled = false;
                    }
                },
                theme: {
                    color: "#c2410c"
                }
            };

            const razorpay = new Razorpay(options);

            razorpay.on("payment.failed", function (response) {
                buttonEl.disabled = false;
                const reason = response && response.error && response.error.description
                    ? response.error.description
                    : "Payment failed. Please try again.";
                alert(reason);
            });

            try {
                razorpay.open();
            } catch (error) {
                buttonEl.disabled = false;
                alert("Unable to open payment window. Please try again.");
            }
        });
    </script>
</body>
</html>
