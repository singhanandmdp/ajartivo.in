<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJartivo | Test Payment Integration</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --ok: #16a34a;
            --warning: #ea580c;
            --border: #e2e8f0;
            --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 40%);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .header p {
            color: var(--muted);
            margin-top: 8px;
        }

        .top-actions {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top-actions button {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 10px;
            min-height: 40px;
            padding: 0 14px;
            cursor: pointer;
            font-weight: 600;
            color: #1e293b;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .top-actions button:hover {
            transform: translateY(-1px);
            border-color: #cbd5e1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .card-image {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #e2e8f0;
        }

        .card-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            min-width: 74px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.05em;
            border: 1px solid transparent;
        }

        .badge.free {
            background: #ecfdf3;
            color: #15803d;
            border-color: #bbf7d0;
        }

        .badge.premium {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .price {
            font-weight: 700;
            color: #1e293b;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            min-height: 44px;
            padding: 0 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .action-btn.free {
            background: var(--ok);
            color: #fff;
            box-shadow: 0 10px 22px rgba(22, 163, 74, 0.24);
        }

        .action-btn.premium {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.24);
        }

        .action-btn.premium:hover {
            background: var(--primary-dark);
        }

        .footer-note {
            margin-top: 20px;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .card-image {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AJartivo Design Store</h1>
            <p>Razorpay Test Mode integration for FREE and PREMIUM design downloads.</p>

            <div class="top-actions">
                <!-- Demo login toggles so you can test login-check behavior quickly -->
                <button type="button" id="mockLoginBtn">Mock Login</button>
                <button type="button" id="mockLogoutBtn">Mock Logout</button>
            </div>
        </header>

        <main>
            <section class="grid" id="designGrid"></section>
            <p class="footer-note">
                Test Mode only. Key Secret is intentionally not used in frontend.
            </p>
        </main>
    </div>

    <script>
        // Razorpay Test Key ID (safe for frontend in test mode)
        const RAZORPAY_KEY_ID = "rzp_test_S0J9wQ1HstsZ4d";

        // Design dataset (replace fileUrl/image with your real uploaded files)
        const designs = [
            {
                id: "d1",
                title: "Festival Poster Pack",
                image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=900",
                type: "FREE",
                amount: 0,
                fileUrl: "/downloads/festival-poster-pack.zip"
            },
            {
                id: "d2",
                title: "Premium Business Flyer",
                image: "https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?w=900",
                type: "PREMIUM",
                amount: 500,
                fileUrl: "/downloads/premium-business-flyer.zip"
            },
            {
                id: "d3",
                title: "Social Media Bundle",
                image: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=900",
                type: "PREMIUM",
                amount: 799,
                fileUrl: "/downloads/social-media-bundle.zip"
            },
            {
                id: "d4",
                title: "Free Wedding Invitation",
                image: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=900",
                type: "FREE",
                amount: 0,
                fileUrl: "/downloads/free-wedding-invitation.zip"
            }
        ];

        const designGrid = document.getElementById("designGrid");
        const mockLoginBtn = document.getElementById("mockLoginBtn");
        const mockLogoutBtn = document.getElementById("mockLogoutBtn");

        renderCards();
        bindMockLoginButtons();

        function renderCards() {
            designGrid.innerHTML = designs.map((design) => {
                const isFree = design.type === "FREE";
                const price = isFree ? "Free" : `₹${Number(design.amount || 0)}`;
                const btnText = isFree ? "Download Free" : "Buy & Download";

                return `
                    <article class="card">
                        <img class="card-image" src="${escapeHtml(design.image)}" alt="${escapeHtml(design.title)}">
                        <div class="card-body">
                            <h3 class="card-title">${escapeHtml(design.title)}</h3>
                            <div class="card-meta">
                                <span class="badge ${isFree ? "free" : "premium"}">${design.type}</span>
                                <span class="price">${price}</span>
                            </div>
                            <button
                                type="button"
                                class="action-btn ${isFree ? "free" : "premium"}"
                                data-design-id="${escapeHtml(design.id)}"
                            >
                                ${btnText}
                            </button>
                        </div>
                    </article>
                `;
            }).join("");

            designGrid.querySelectorAll("button[data-design-id]").forEach((button) => {
                button.addEventListener("click", () => {
                    const designId = button.getAttribute("data-design-id");
                    const selectedDesign = designs.find((item) => item.id === designId);
                    if (!selectedDesign) return;
                    handleDesignAction(selectedDesign);
                });
            });
        }

        function handleDesignAction(design) {
            // Login check for both FREE and PREMIUM flow
            if (!isUserLoggedIn()) {
                alert("Login required");
                return;
            }

            if (design.type === "FREE") {
                downloadFile(design);
                return;
            }

            openRazorpayCheckout(design);
        }

        function openRazorpayCheckout(design) {
            const amountInPaise = Math.round(Number(design.amount || 0) * 100);

            if (!amountInPaise || amountInPaise < 100) {
                alert("Invalid premium amount.");
                return;
            }

            const options = {
                key: RAZORPAY_KEY_ID,
                amount: amountInPaise,
                currency: "INR",
                name: "AJartivo",
                description: "Design Purchase",
                image: "https://ajartivo.in/ajartivo.ico",
                // In production: create order_id from secure backend and use here
                handler: function () {
                    alert("Payment Successful");
                    // Only the purchased design file is downloaded after success
                    downloadFile(design);
                },
                prefill: {
                    name: "AJartivo Test User",
                    email: "testuser@ajartivo.in",
                    contact: "9999999999"
                },
                theme: {
                    color: "#2563eb"
                },
                modal: {
                    ondismiss: function () {
                        console.log("Payment popup closed by user.");
                    }
                }
            };

            const razorpay = new Razorpay(options);

            razorpay.on("payment.failed", function (response) {
                console.error("Payment failed:", response.error);
                alert("Payment failed. Please retry in test mode.");
            });

            razorpay.open();
        }

        function downloadFile(design) {
            const link = document.createElement("a");
            link.href = design.fileUrl;
            link.download = "";
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        function isUserLoggedIn() {
            // If your site has Firebase auth loaded, use real auth state
            try {
                if (window.firebase && firebase.auth && firebase.auth().currentUser) {
                    return true;
                }
            } catch (error) {
                console.log("Firebase auth check skipped:", error);
            }

            // Fallback local flag for simple HTML/JS testing
            return localStorage.getItem("ajartivo_logged_in") === "true";
        }

        function bindMockLoginButtons() {
            mockLoginBtn.addEventListener("click", function () {
                localStorage.setItem("ajartivo_logged_in", "true");
                alert("Mock login enabled");
            });

            mockLogoutBtn.addEventListener("click", function () {
                localStorage.removeItem("ajartivo_logged_in");
                alert("Mock login removed");
            });
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
    </script>
</body>
</html>
